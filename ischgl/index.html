<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Relax. If you can…" />
        <title>Ischgl</title>
        <style>
            :root {
                color-scheme: light dark;
            }

            body {
                font-family: monospace;
                font-size: 1.25rem;
                line-height: 1.5;
            }

            main {
                max-width: min(80ch, 100% - 4rem);
                margin-inline: auto;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
                gap: 1rem;

                > a {
                    aspect-ratio: 16 / 9;
                    background-blend-mode: darken;
                    background-color: rgba(0, 0, 0, 0.5);
                    background-size: contain;

                    > h3 {
                        margin-left: 2rem;
                    }
                }
            }

            @media (prefers-color-scheme: light) {
              a {
                color: black;
              }
            }

            @media (prefers-color-scheme: dark) {
                a {
                    color: white;
                }
            }
        </style>
        <link rel="preload" as="image" href="/ischgl/images/ischgltv.webp" fetchpriority="high">
        <link rel="preload" as="image" href="/ischgl/images/samnaunpre.webp" fetchpriority="high">
        <link rel="preload" as="image" href="/ischgl/images/flyingcam/VI-2025-11-28-12-00-01.webp" fetchpriority="high">

        <link rel="preload" as="image" href="/ischgl/images/flyingcam/VI-2025-11-12-14-20-01.webp" fetchpriority="high">
        <link rel="preload" as="image" href="/ischgl/images/flyingcam/VI-2025-11-04-14-50-01.webp" fetchpriority="high">
    </head>
